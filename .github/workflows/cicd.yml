name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/crabs3:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

  update_latest:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Update latest tag
        run: |
          docker pull ${{ vars.DOCKERHUB_USERNAME }}/crabs3:${{ github.sha }}
          docker tag ${{ vars.DOCKERHUB_USERNAME }}/crabs3:${{ github.sha }} ${{ vars.DOCKERHUB_USERNAME }}/crabs3:latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/crabs3:latest

  deploy:
    runs-on: self-hosted
    needs: update_latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_APP_DIR }}
            docker pull ${{ vars.DOCKERHUB_USERNAME }}/crabs3:${{ github.sha }}
            docker compose -f compose.yml up -d --force-recreate
