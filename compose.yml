services:
  web:
    build: .
    ports:
      - "5000:3000"
    container_name: crabs3
    environment:
      - S3_ENDPOINT=http://192.168.1.100:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY_ID=changeme
      - S3_SECRET_ACCESS_KEY=changeme
      - S3_BUCKET_NAME=transfer
    networks:
      - crabs3-network

networks:
  crabs3-network:
    driver: bridge